script: |
  import boto3
  from botocore.exceptions import ClientError
  import json
  from typing import Dict, Any

  def main():
      """
      Main function to remove public access from S3 bucket using boto3.
      This script blocks all public access to the S3 bucket identified in the asset context.
      """
      try:
          # 1. Get AWS credentials from script parameter
          args = demisto.args()
          aws_credentials = args.get('aws_credentials')

          if not aws_credentials:
              return_error("Missing required 'aws_credentials' parameter. "
                           "Please provide AWS credentials in the specified format.")
              return

          # 2. Parse AWS credentials from the parameter format
          # Expected format:
          # [ACCOUNTIDAWSAdministratorAccess]
          # aws_access_key_id=__REDACTED__
          # aws_secret_access_key=__REDACTED__
          # aws_session_token=__REDACTED__

          access_key = None
          secret_key = None
          session_token = None
          region = None

          for line in aws_credentials.strip().split('\n'):
              line = line.strip()
              if line.startswith('[') and line.endswith(']'):
                  # Extract region from account ID if possible
                  # Format: [ACCOUNTIDAWSAdministratorAccess]
                  continue
              elif '=' in line:
                  key, value = line.split('=', 1)
                  key = key.strip()
                  value = value.strip()

                  if key == 'aws_access_key_id':
                      access_key = value
                  elif key == 'aws_secret_access_key':
                      secret_key = value
                  elif key == 'aws_session_token':
                      session_token = value
                  elif key == 'region':
                      region = value

          # 3. Set default region if not provided
          if not region:
              region = 'us-east-1'  # Default region

          # 4. Validate that you received all the required AWS credentials
          if not all([access_key, secret_key]):
              return_error("Missing required AWS credentials (aws_access_key_id, aws_secret_access_key). "
                           "Please ensure the aws_credentials parameter is properly formatted.")
              return

          # 5. Retrieve the entire incident context
          context = demisto.context()

          # 5. Get S3 bucket name from Core.CoreAsset context
          core_data = context.get('Core', {})
          if not isinstance(core_data, dict):
              return_error("Core context not found. Please ensure the Get Asset Details task was completed.")
              return

          core_asset = core_data.get('CoreAsset')
          if not core_asset:
              return_error("CoreAsset not found in context. Please ensure the Get Asset Details task was completed.")
              return

          # Handle both list and dict formats for CoreAsset
          bucket_name = None
          asset_name = None

          if isinstance(core_asset, list) and len(core_asset) > 0:
              asset = core_asset[0]
              bucket_name = asset.get('xdm__asset__strong_id')
              asset_name = asset.get('xdm__asset__name')
          elif isinstance(core_asset, dict):
              bucket_name = core_asset.get('xdm__asset__strong_id')
              asset_name = core_asset.get('xdm__asset__name')

          if not bucket_name:
              return_error("S3 bucket name not found in asset context. Please ensure this is an S3 bucket asset.")
              return

          demisto.results(f"Attempting to remove public access from S3 bucket: {bucket_name} in region: {region}...")

          # 6. Initialize boto3 session with credentials
          session_kwargs = {
              'aws_access_key_id': access_key,
              'aws_secret_access_key': secret_key,
              'region_name': region
          }
          if session_token:
              session_kwargs['aws_session_token'] = session_token

          session = boto3.Session(**session_kwargs)
          s3_client = session.client('s3')

          actions_taken = []

          # 7. Block all public access using Public Access Block
          try:
              s3_client.put_public_access_block(
                  Bucket=bucket_name,
                  PublicAccessBlockConfiguration={
                      'BlockPublicAcls': True,
                      'IgnorePublicAcls': True,
                      'BlockPublicPolicy': True,
                      'RestrictPublicBuckets': True
                  }
              )
              actions_taken.append("✅ Applied Public Access Block configuration")
          except ClientError as e:
              if e.response['Error']['Code'] == 'NoSuchBucket':
                  return_error(f"S3 bucket '{bucket_name}' does not exist or is not accessible.")
                  return
              else:
                  actions_taken.append(f"⚠️ Failed to apply Public Access Block: {e}")

          # 8. Remove bucket policy if it exists
          try:
              s3_client.delete_bucket_policy(Bucket=bucket_name)
              actions_taken.append("✅ Removed bucket policy")
          except ClientError as e:
              if e.response['Error']['Code'] == 'NoSuchBucketPolicy':
                  actions_taken.append("ℹ️ No bucket policy found to remove")
              else:
                  actions_taken.append(f"⚠️ Failed to remove bucket policy: {e}")

          # 9. Get current ACL and remove public permissions
          try:
              acl_response = s3_client.get_bucket_acl(Bucket=bucket_name)

              # Filter out public grants
              filtered_grants = []
              public_grants_removed = 0

              for grant in acl_response.get('Grants', []):
                  grantee = grant.get('Grantee', {})
                  grantee_type = grantee.get('Type')

                  # Remove grants to "AllUsers" or "AuthenticatedUsers"
                  if grantee_type == 'Group':
                      uri = grantee.get('URI', '')
                      if 'AllUsers' in uri or 'AuthenticatedUsers' in uri:
                          public_grants_removed += 1
                          continue

                  filtered_grants.append(grant)

              # Update ACL if public grants were found
              if public_grants_removed > 0:
                  s3_client.put_bucket_acl(
                      Bucket=bucket_name,
                      AccessControlPolicy={
                          'Owner': acl_response['Owner'],
                          'Grants': filtered_grants
                      }
                  )
                  actions_taken.append(f"✅ Removed {public_grants_removed} public ACL grants")
              else:
                  actions_taken.append("ℹ️ No public ACL grants found to remove")

          except ClientError as e:
              actions_taken.append(f"⚠️ Failed to modify bucket ACL: {e}")

          # 10. Verify the bucket is no longer publicly accessible
          try:
              # Check if bucket policy allows public access
              policy_status = s3_client.get_bucket_policy_status(Bucket=bucket_name)
              is_public = policy_status.get('PolicyStatus', {}).get('IsPublic', False)

              if is_public:
                  actions_taken.append("⚠️ Warning: Bucket may still have public access via policy")
              else:
                  actions_taken.append("✅ Verified: Bucket policy does not allow public access")

          except ClientError as e:
              if e.response['Error']['Code'] == 'NoSuchBucketPolicy':
                  actions_taken.append("✅ Verified: No bucket policy exists")
              else:
                  actions_taken.append(f"ℹ️ Could not verify policy status: {e}")

          # Prepare readable output
          readable_output = f"""**S3 Public Access Removal Results**

  **Bucket Information:**
  - Bucket Name: {bucket_name}
  - Asset Name: {asset_name}
  - Region: {region}

  **Actions Taken:**
  {chr(10).join([f"  {action}" for action in actions_taken])}

  **Summary:**
  The S3 bucket has been configured to block public access. This includes:
  - Public Access Block settings enabled
  - Bucket policy removed (if existed)
  - Public ACL grants removed (if any)

  The bucket should now be private and not accessible to the public internet.
  """

          # Prepare output data
          outputs = {
              "bucket_name": bucket_name,
              "asset_name": asset_name,
              "region": region,
              "actions_taken": actions_taken,
              "success": True,
              "public_access_blocked": True
          }

          # Return results to XSOAR War Room
          command_results = CommandResults(
              readable_output=readable_output,
              outputs_prefix="S3PublicAccessRemoval",
              outputs=outputs,
              outputs_key_field="bucket_name"
          )
          return_results(command_results)

      except ClientError as e:
          # Handle Boto3-specific errors (e.g., authentication failure)
          return_error(f"AWS Client Error: {e}. Check the provided credentials and permissions.")
      except Exception as e:
          # Handle any other unexpected errors
          return_error(f"An unexpected error occurred while removing S3 public access: {str(e)}")


  def test_module():
      """
      Test function to validate AWS credentials and S3 access.
      """
      try:
          context = demisto.context()
          aws_creds = context.get('AWS', {}).get('Credentials', {})

          access_key = aws_creds.get('AccessKeyID')
          secret_key = aws_creds.get('SecretAccessKey')
          region = aws_creds.get('Region')

          if not all([access_key, secret_key, region]):
              return_error("Missing AWS credentials for testing")
              return

          # Test AWS connection
          s3_client = boto3.client(
              's3',
              aws_access_key_id=access_key,
              aws_secret_access_key=secret_key,
              region_name=region
          )

          # Simple test - list buckets (requires minimal permissions)
          s3_client.list_buckets()
          return_results("✅ AWS S3 connection test successful")

      except ClientError as e:
          return_error(f"AWS connection test failed: {e}")
      except Exception as e:
          return_error(f"Test failed with error: {str(e)}")


  if __name__ in ('__main__', '__builtin__', 'builtins'):
      main()
