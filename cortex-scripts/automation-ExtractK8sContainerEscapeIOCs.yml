    type: String
  - contextPath: K8sEscape.NodeFQDN
    description: EKS node FQDN
    type: String
  - contextPath: K8sEscape.NodeIPs
    description: EKS node IP addresses
    type: Unknown
  - contextPath: K8sEscape.Username
    description: Source username (e.g. root)
    type: String
  - contextPath: K8sEscape.ProcessName
    description: Causality actor process name
    type: String
  - contextPath: K8sEscape.ProcessCommandLine
    description: Causality actor process command line
    type: String
  - contextPath: K8sEscape.ProcessImagePath
    description: Causality actor process image path
    type: String
  - contextPath: K8sEscape.ProcessImageSHA256
    description: Causality actor process image SHA256
    type: String
  - contextPath: K8sEscape.ContainerImageID
    description: Container image ID
    type: String
  - contextPath: K8sEscape.Details
    description: Issue details text
    type: String
  - contextPath: K8sEscape.IsSpringShell
    description: Whether Spring4Shell indicators were detected
    type: Boolean
  - contextPath: K8sEscape.IsWebshell
    description: Whether webshell indicators were detected
    type: Boolean
  - contextPath: K8sEscape.IsPrivilegedUser
    description: Whether a privileged user (root) was detected
