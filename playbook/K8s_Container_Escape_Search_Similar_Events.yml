        simple: ${K8sEscape.NodeFQDN}
      process_name:
        simple: ${K8sEscape.ProcessName}
      process_sha256:
        simple: ${K8sEscape.ProcessImageSHA256}
      image_id:
        simple: ${K8sEscape.ContainerImageID}
      details:
        simple: ${K8sEscape.Details}
      time_range:
        simple: "30 days"
    separatecontext: false
