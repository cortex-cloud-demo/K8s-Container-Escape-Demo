    type: condition
    task:
      id: b7c7d7e7-f7a7-4b7c-8d7e-0f7a7b7c7d7e
      version: -1
      name: "Analyst Review"
      description: |-
        Review the XQL query results from tasks 3-5 and the generated queries
        in the k8ssearchsimilarevents issue field.

        Automated hunt results (tasks 3-5):
        - Webshell drops across K8s nodes
        - Container escape patterns across nodes
        - IMDS credential theft across nodes

        Additional targeted queries (run manually in Query Center):
        - Same process on other nodes (lateral movement)
        - Same binary SHA256 across endpoints (IOC hunt)
        - Same container image on other nodes (blast radius)
        - Other alerts in same namespace (correlation)

        Decision:
        - Escalate: if similar events found on other nodes
        - Close: if no spread detected
      iscommand: false
      brand: ""
      script: ""
      playbooktaskmissingcomponent: null
      istaskmissingcomponenterrordismissed: false
    nexttasks:
      "Escalate - Similar Events Found":
