      version: -1
      name: "XQL: IMDS Credential Theft Hunt (All Nodes)"
      description: |-
        Search for EC2 metadata service access (169.254.169.254) from K8s containers.
        IMDS access from containers indicates credential theft attempt
        (AWS temporary credentials via instance role).

        Detects if IMDS credential theft is happening on other nodes.
      iscommand: true
      brand: ""
      script: xdr-xql-generic-query
      playbooktaskmissingcomponent: null
      istaskmissingcomponenterrordismissed: false
    nexttasks:
      '#none#':
        - "6"
    scriptarguments:
      query_name:
        simple: "K8s IMDS Credential Theft Hunt"
      query:
        simple: |-
          dataset = xdr_data
          | filter event_type = ENUM.NETWORK
          | filter action_remote_ip = "169.254.169.254"
                   or dst_action_external_hostname contains "169.254.169.254"
          | filter agent_hostname contains "compute.internal"
          | fields _time, agent_hostname, action_process_image_name,
                   action_process_image_command_line,
                   action_local_ip, action_remote_ip, action_remote_port,
                   actor_process_image_name
          | sort desc _time
          | limit 50
      time_frame:
        simple: "30 days"
    separatecontext: false
    continueonerror: true
    continueonerrortype: ""
    view: |-
