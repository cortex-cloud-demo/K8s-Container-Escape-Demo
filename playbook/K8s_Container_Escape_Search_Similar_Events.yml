id: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e
version: -1
name: K8s Container Escape - Search Similar Events
description: |-
  Threat hunting playbook for K8s container escape incidents on AWS EKS.
  Searches for similar events across the Cortex XDR tenant to determine
  blast radius and detect lateral movement.

  ## Playbook Flow
  1. Triage - ExtractK8sContainerEscapeIOCs analyzes XDR issue fields
  2. Search Similar Events - K8sSearchSimilarEvents generates cross-search XQL queries
  3-5. XQL Execution - Broad threat hunts executed via xdr-xql-generic-query:
       3. Webshell Hunt (all K8s nodes)
       4. Container Escape Hunt (all nodes)
       5. IMDS Credential Theft Hunt (all nodes)
  6. Analyst Review - Review results + run targeted IOC queries manually
  7. Escalate / 8. Close

  ## XQL Integration
  - Targeted searches (lateral movement, IOC hunt, blast radius) are generated
    and stored in issue field for manual Query Center execution
  - Broad threat hunts (webshell, escape, IMDS) are executed automatically
    via xdr-xql-generic-query to provide immediate visibility

  ## Usage
  - Run after initial triage to determine if the attack has spread
  - Can be triggered manually on any container escape XDR issue
  - Does NOT perform containment — investigation only
