      name: "Escalation Required"
      description: |-
        Similar events detected on other nodes/clusters.
        The attack may have spread beyond the initially compromised container.

        Recommended next steps:
        - Extend containment to affected nodes (run Containment playbook per node)
        - Cordon all nodes running the vulnerable container image
        - Rotate AWS credentials exposed via IMDS on all affected nodes
        - Notify SOC and escalate incident severity
        - Consider cluster-wide remediation
