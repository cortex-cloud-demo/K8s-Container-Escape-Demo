  "3":
    id: "3"
    taskid: b4c4d4e4-f4a4-4b4c-8d4e-0f4a4b4c4d4e
    type: regular
    task:
      id: b4c4d4e4-f4a4-4b4c-8d4e-0f4a4b4c4d4e
      version: -1
      name: "XQL: Webshell Hunt (All K8s Nodes)"
      description: |-
        Search for webshell file drops (.jsp, .php) across ALL monitored K8s nodes.
        Detects if the attacker has deployed webshells on other nodes beyond the
        initially compromised one.

        Executed automatically via xdr-xql-generic-query.
      iscommand: true
      brand: ""
      script: xdr-xql-generic-query
      playbooktaskmissingcomponent: null
      istaskmissingcomponenterrordismissed: false
    nexttasks:
      '#none#':
        - "4"
    scriptarguments:
      query_name:
        simple: "K8s Webshell Hunt"
      query:
        simple: |-
          dataset = xdr_data
          | filter event_type = ENUM.FILE
          | filter action_file_path contains ".jsp" or action_file_path contains "webshell"
                   or action_file_path contains "cmd.jsp" or action_file_path contains "shell.jsp"
          | filter agent_hostname contains "compute.internal"
          | fields _time, agent_hostname, action_file_path, action_file_name,
                   action_file_sha256, action_process_image_name,
                   action_process_image_command_line
          | sort desc _time
          | limit 50
      time_frame:
        simple: "30 days"
    separatecontext: false
    continueonerror: true
    continueonerrortype: ""
    view: |-
      {
        "position": {
          "x": 450,
          "y": 600
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: true
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "4":
    id: "4"
    taskid: b5c5d5e5-f5a5-4b5c-8d5e-0f5a5b5c5d5e
    type: regular
    task:
      id: b5c5d5e5-f5a5-4b5c-8d5e-0f5a5b5c5d5e
      version: -1
      name: "XQL: Container Escape Hunt (All Nodes)"
      description: |-
        Search for container escape patterns across ALL monitored endpoints:
        nsenter execution, chroot, /proc/1/root access, suspicious mount operations.

        Detects if container escape techniques are being used on other nodes.
      iscommand: true
      brand: ""
      script: xdr-xql-generic-query
      playbooktaskmissingcomponent: null
      istaskmissingcomponenterrordismissed: false
    nexttasks:
      '#none#':
        - "5"
    scriptarguments:
      query_name:
        simple: "K8s Container Escape Hunt"
      query:
        simple: |-
          dataset = xdr_data
          | filter event_type = ENUM.PROCESS
          | filter action_process_image_command_line contains "nsenter"
                   or action_process_image_command_line contains "/proc/1/root"
                   or action_process_image_command_line contains "chroot"
                   or (action_process_image_name = "mount" AND action_process_image_command_line contains "/host")
          | filter agent_hostname contains "compute.internal"
          | fields _time, agent_hostname, action_process_image_name,
                   action_process_image_command_line, action_process_username,
                   actor_process_image_name, causality_actor_process_image_name
          | sort desc _time
          | limit 50
      time_frame:
        simple: "30 days"
    separatecontext: false
    continueonerror: true
    continueonerrortype: ""
